name: Deploy FitTrack

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          echo "Checking template file exists..."
          ls -la fitness-app/js/config.template.js

          echo "Injecting secrets..."
          cp fitness-app/js/config.template.js fitness-app/js/config.js

          sed -i "s|__GEMINI_API_KEY__|${GEMINI_API_KEY}|g"                     fitness-app/js/config.js
          sed -i "s|__FIREBASE_API_KEY__|${FIREBASE_API_KEY}|g"                 fitness-app/js/config.js
          sed -i "s|__FIREBASE_AUTH_DOMAIN__|${FIREBASE_AUTH_DOMAIN}|g"         fitness-app/js/config.js
          sed -i "s|__FIREBASE_PROJECT_ID__|${FIREBASE_PROJECT_ID}|g"           fitness-app/js/config.js
          sed -i "s|__FIREBASE_STORAGE_BUCKET__|${FIREBASE_STORAGE_BUCKET}|g"   fitness-app/js/config.js
          sed -i "s|__FIREBASE_MESSAGING_SENDER_ID__|${FIREBASE_MESSAGING_SENDER_ID}|g" fitness-app/js/config.js
          sed -i "s|__FIREBASE_APP_ID__|${FIREBASE_APP_ID}|g"                   fitness-app/js/config.js
          sed -i "s|__FIREBASE_MEASUREMENT_ID__|${FIREBASE_MEASUREMENT_ID}|g"   fitness-app/js/config.js

          echo "Done. Verifying (secrets masked):"
          grep -c "__" fitness-app/js/config.js && echo "WARNING: some placeholders not replaced" || echo "All placeholders replaced successfully"
        env:
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_API_KEY:           ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:       ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:        ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:    ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:            ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:    ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fitness-app
          publish_branch: gh-pages
