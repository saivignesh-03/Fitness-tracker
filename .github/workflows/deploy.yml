name: Deploy FitTrack

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          python3 - <<'EOF'
          import os

          with open('fitness-app/js/config.template.js', 'r') as f:
              content = f.read()

          def clean(key):
              return os.environ[key].strip().replace('\n', '').replace('\r', '')

          replacements = {
              '__GEMINI_API_KEY__':               clean('GEMINI_API_KEY'),
              '__FIREBASE_API_KEY__':             clean('FIREBASE_API_KEY'),
              '__FIREBASE_AUTH_DOMAIN__':         clean('FIREBASE_AUTH_DOMAIN'),
              '__FIREBASE_PROJECT_ID__':          clean('FIREBASE_PROJECT_ID'),
              '__FIREBASE_STORAGE_BUCKET__':      clean('FIREBASE_STORAGE_BUCKET'),
              '__FIREBASE_MESSAGING_SENDER_ID__': clean('FIREBASE_MESSAGING_SENDER_ID'),
              '__FIREBASE_APP_ID__':              clean('FIREBASE_APP_ID'),
              '__FIREBASE_MEASUREMENT_ID__':      clean('FIREBASE_MEASUREMENT_ID'),
          }

          for placeholder, value in replacements.items():
              content = content.replace(placeholder, value)

          with open('fitness-app/js/config.js', 'w') as f:
              f.write(content)

          print("config.js generated successfully")
          EOF
        env:
          GEMINI_API_KEY:               ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:      ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./fitness-app
          publish_branch: gh-pages
